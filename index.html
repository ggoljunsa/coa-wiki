function renderNav(active) {
  const nav = document.getElementById("navList");
  nav.innerHTML = "";
  NAV_ORDER.forEach(group => {
    const groupHeader = document.createElement("li");
    groupHeader.innerHTML = `<div style="font-weight:700; color:#34466b; padding:6px 4px 2px; font-size:12px;">${group.group}</div>`;
    nav.appendChild(groupHeader);
    group.items.forEach(key => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "#" + encodeURIComponent(key);
      a.textContent = ARTICLES[key] ? ARTICLES[key].title : key;
      if (key === active) a.classList.add("active");
      li.appendChild(a);
      nav.appendChild(li);
    });
  });
}

function renderArticle(key) {
  const art = ARTICLES[key] || ARTICLES["main"];
  const area = document.getElementById("articleArea");

  let html = '';
  if (key !== "main") {
    html += `<div class="breadcrumb"><a href="#main">컴구위키</a> &gt; ${art.title}</div>`;
  }
  html += `<h1>${art.title}</h1>`;
  html += `<div class="meta">분류: ${art.category.map(c => `<span class="cat-tag">${c}</span>`).join("")}</div>`;
  html += renderWikiText(art.body);
  html += `<div class="categories">분류: ${art.category.map(c => `<span class="cat-tag">${c}</span>`).join("")}</div>`;

  area.innerHTML = html;

  renderNav(key);
  renderTOC();
  window.scrollTo(0, 0);
}

// 마크다운 비슷한 문법 → HTML 변환
function renderWikiText(text) {
  // 줄 단위 처리
  const lines = text.split("\n");
  let html = "";
  let inTable = false;
  let tableRows = [];
  let inPre = false;
  let preContent = "";
  let preClass = "";
  let inList = false;
  let listType = "";
  let inFootnotes = false;

  function flushTable() {
    if (tableRows.length === 0) return;
    let t = '<table>';
    tableRows.forEach((row, idx) => {
      const isHeader = row.cells[0].header;
      t += '<tr>';
      row.cells.forEach(c => {
        const tag = c.header ? 'th' : 'td';
        t += `<${tag}>${inlineFormat(c.text.trim())}</${tag}>`;
      });
      t += '</tr>';
    });
    t += '</table>';
    html += t;
    tableRows = [];
    inTable = false;
  }
  function closeList() {
    if (inList) {
      html += listType === "ul" ? "</ul>" : "</ol>";
      inList = false;
    }
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // 코드블록
    if (line.startsWith("<pre")) {
      closeList(); flushTable();
      inPre = true;
      preClass = line.includes('class="ascii"') ? 'ascii' : '';
      preContent = "";
      continue;
    }
    if (inPre) {
      if (line.startsWith("</pre>")) {
        html += `<pre class="${preClass}">${preContent.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</pre>`;
        inPre = false;
      } else {
        preContent += line + "\n";
      }
      continue;
    }

    // 박스류
    const boxMatch = line.match(/^\{(info|warn|tip|joke)\}(.*)\{\/\1\}$/);
    if (boxMatch) {
      closeList(); flushTable();
      html += `<div class="${boxMatch[1]}">${inlineFormat(boxMatch[2])}</div>`;
      continue;
    }

    // 다중줄 박스 시작
    const boxStart = line.match(/^\{(info|warn|tip|joke)\}(.*)$/);
    if (boxStart && !line.includes("{/")) {
      closeList(); flushTable();
      let cls = boxStart[1];
      let content = boxStart[2];
      while (++i < lines.length) {
        const next = lines[i];
        if (next.match(new RegExp(`\\{/${cls}\\}$`))) {
          content += "\n" + next.replace(new RegExp(`\\{/${cls}\\}$`), '');
          break;
        }
        content += "\n" + next;
      }
      html += `<div class="${cls}">${inlineFormat(content).replace(/\n/g, '<br>')}</div>`;
      continue;
    }

    // footnotes
    if (line.trim() === "{footnotes}") { inFootnotes = true; html += '<div class="footnote">'; continue; }
    if (line.trim() === "{/footnotes}") { inFootnotes = false; html += '</div>'; continue; }

    // 표 (위키스타일 {| ... |})
    if (line.startsWith("{|")) { closeList(); inTable = true; tableRows = []; continue; }
    if (line.startsWith("|}")) { flushTable(); continue; }
    if (inTable) {
      if (line.startsWith("|-")) continue;
      if (line.startsWith("!")) {
        const cells = line.substring(1).split("||").map(c => ({text: c, header: true}));
        tableRows.push({cells});
      } else if (line.startsWith("|")) {
        const cells = line.substring(1).split("||").map(c => ({text: c, header: false}));
        tableRows.push({cells});
      }
      continue;
    }

    // 헤딩
    if (line.startsWith("== ") && line.endsWith(" ==")) {
      closeList(); flushTable();
      const text = line.slice(3, -3);
      const id = "h_" + text.replace(/\s/g, "_");
      html += `<h2 id="${id}">${inlineFormat(text)}</h2>`;
      continue;
    }
    if (line.startsWith("=== ") && line.endsWith(" ===")) {
      closeList(); flushTable();
      const text = line.slice(4, -4);
      const id = "h_" + text.replace(/\s/g, "_");
      html += `<h3 id="${id}">${inlineFormat(text)}</h3>`;
      continue;
    }
    if (line.startsWith("==== ") && line.endsWith(" ====")) {
      closeList(); flushTable();
      const text = line.slice(5, -5);
      html += `<h4>${inlineFormat(text)}</h4>`;
      continue;
    }

    // 목록
    if (line.startsWith("* ")) {
      if (!inList || listType !== "ul") {
        closeList();
        html += "<ul>"; inList = true; listType = "ul";
      }
      html += `<li>${inlineFormat(line.substring(2))}</li>`;
      continue;
    }
    if (line.startsWith("# ")) {
      if (!inList || listType !== "ol") {
        closeList();
        html += "<ol>"; inList = true; listType = "ol";
      }
      html += `<li>${inlineFormat(line.substring(2))}</li>`;
      continue;
    }
    closeList();

    // 빈줄
    if (line.trim() === "") continue;

    // 이미지 한 줄짜리 line은 <p>로 감싸지 않음 (block-level figure)
    if (line.trim().startsWith("[[img:") && line.trim().endsWith("]]")) {
      html += inlineFormat(line);
      continue;
    }

    // 일반 문단
    html += `<p>${inlineFormat(line)}</p>`;
  }
  closeList(); flushTable();
  return html;
}

function inlineFormat(text) {
  // [[img:filename|caption|size]] — PDF 캡처 이미지
  text = text.replace(/\[\[img:([^\|\]]+)(?:\|([^\|\]]*))?(?:\|(small|medium|large))?\]\]/g, (m, fname, caption, size) => {
    const cls = size || 'medium';
    const cap = caption ? `<figcaption>${caption}</figcaption>` : '';
    return `<figure class="pdf-img ${cls}"><img src="images/${fname}" alt="${caption||fname}" loading="lazy">${cap}</figure>`;
  });
  // [[link|text]] or [[link]]
  text = text.replace(/\[\[([^\|\]]+)\|([^\]]+)\]\]/g, (m, key, label) => {
    const exists = !!ARTICLES[key];
    const cls = exists ? "wiki" : "wiki wiki-stub";
    return `<a href="#${encodeURIComponent(key)}" class="${cls}">${label}</a>`;
  });
  text = text.replace(/\[\[([^\]]+)\]\]/g, (m, key) => {
    const exists = !!ARTICLES[key];
    const cls = exists ? "wiki" : "wiki wiki-stub";
    const label = ARTICLES[key] ? ARTICLES[key].title : key;
    return `<a href="#${encodeURIComponent(key)}" class="${cls}">${label}</a>`;
  });
  // bold ''' '''
  text = text.replace(/'''([^']+)'''/g, '<strong>$1</strong>');
  // italic '' ''
  text = text.replace(/''([^']+)''/g, '<em>$1</em>');
  // code `` 는 그대로
  return text;
}

function renderTOC() {
  const tocList = document.getElementById("tocList");
  const headings = document.querySelectorAll("main h2, main h3");
  tocList.innerHTML = "";
  headings.forEach(h => {
    const li = document.createElement("li");
    li.className = "toc-item " + (h.tagName === "H2" ? "l2" : "l3");
    const a = document.createElement("a");
    a.href = "#" + h.id;
    a.textContent = h.textContent;
    a.style.color = "#1d65b3";
    a.style.textDecoration = "none";
    a.style.fontSize = "12px";
    li.appendChild(a);
    tocList.appendChild(li);
  });
}

// 검색
document.getElementById("searchBox").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  const nav = document.getElementById("navList");
  if (q === "") {
    renderNav(currentArticle());
    return;
  }
  nav.innerHTML = "";
  Object.keys(ARTICLES).forEach(key => {
    const art = ARTICLES[key];
    const haystack = (key + " " + art.title + " " + art.body).toLowerCase();
    if (haystack.includes(q)) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "#" + encodeURIComponent(key);
      a.textContent = art.title;
      li.appendChild(a);
      nav.appendChild(li);
    }
  });
});

function currentArticle() {
  const hash = decodeURIComponent(location.hash.substring(1));
  return ARTICLES[hash] ? hash : "main";
}

window.addEventListener("hashchange", () => renderArticle(currentArticle()));
renderArticle(currentArticle());
